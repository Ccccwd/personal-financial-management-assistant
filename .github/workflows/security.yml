name: Security Scan

on:
  push:
    branches: [main, dev, develop]
  pull_request:
    branches: [main]

jobs:
  # 密钥泄露扫描
  gitleaks:
    name: 密钥泄露检测
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks 扫描
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Python 依赖漏洞扫描
  pip-audit:
    name: 依赖安全扫描
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 安装 uv
        uses: astral-sh/setup-uv@v4
      - name: 安装后端依赖
        run: uv sync
      - name: 安装 pip-audit
        run: uv pip install pip-audit
      - name: 运行依赖漏洞扫描
        run: uv run pip-audit --desc
